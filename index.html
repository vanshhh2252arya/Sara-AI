<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SARA AI Assistant</title>
    <style>
        /* CSS Section */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #000; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .hidden { display: none !important; }

        /* Login & Lock Styles */
        .form-container {
            background: rgba(20, 20, 20, 0.95);
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            color: white;
            border: 1px solid #333;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #0078ff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        /* Main App Visuals */
        .visual-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* UI Overlays */
        .top-nav {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 20px;
            z-index: 10;
        }

        .icon-btn {
            background: rgba(0, 0, 0, 0.4);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.2);
            width: auto;
        }

        .controls {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .input-row {
            display: flex;
            width: 90%;
            gap: 10px;
            margin-bottom: 15px;
        }

        #text-input { margin: 0; flex-grow: 1; background: rgba(0,0,0,0.6); }

        #mic-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid white;
            transition: 0.3s;
        }
        
        #mic-btn.listening { background: red; transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="login-screen" class="screen">
        <div class="form-container">
            <h2>AI Assistant Settings</h2>
            <input type="text" id="user-name" placeholder="Apna Naam">
            <input type="password" id="app-pass" placeholder="App Password">
            <input type="text" id="api-1" placeholder="Groq API Key 1">
            <input type="text" id="api-2" placeholder="Groq API Key 2">
            <input type="text" id="api-3" placeholder="Groq API Key 3">
          
            <textarea id="ai-prompt" rows="3" placeholder="AI Personality Prompt"></textarea>
            <button onclick="saveSettings()">SAVE & START</button>
        </div>
    </div>

    <div id="lock-screen" class="screen hidden" style="background: #000;">
        <div class="form-container">
            <h3>Enter Password</h3>
            <input type="password" id="pass-verify" placeholder="Password...">
            <button onclick="verifyPassword()">UNLOCK</button>
        </div>
    </div>

    <div id="main-screen" class="screen hidden">
        <div class="top-nav">
            <button class="icon-btn" onclick="clearMemory()">Clear Memory</button>
            <button class="icon-btn" onclick="showSettings()">⚙️ Settings</button>
        </div>

        <div class="visual-container">
            <video id="normal-video" src="normal.mp4" loop muted playsinline></video>
            <video id="speaking-video" src="speaking.mp4" loop muted playsinline class="hidden"></video>
        </div>

        <div class="controls">
            <div class="input-row">
                <input type="text" id="text-input" placeholder="Kuch likhein...">
                <button style="width: 80px;" onclick="handleTextSend()">Send</button>
            </div>
            <button id="mic-btn" onclick="toggleMic()">🎤</button>
        </div>
    </div>
    
<script src="coi-serviceworker.js"></script>
    
<script src="https://cdn.jsdelivr.net/npm/sherpa-onnx-wasm@1.9.10/dist/sherpa-onnx.js"></script>


    <script>
        /* JavaScript Section */
        let settings = JSON.parse(localStorage.getItem('ai_settings')) || null;
        let chatHistory = [];
        let currentKeyIdx = 0;
        let isListening = false;
        let interimText = "";

        const normalVid = document.getElementById('normal-video');
        const speakingVid = document.getElementById('speaking-video');

        // Initialize App
        window.onload = () => {
            if (!settings) {
                document.getElementById('login-screen').classList.remove('hidden');
            } else {
                showLockScreen();
            }
        };

        // Auto-lock on back/minimize
        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === 'hidden' && settings) {
                showLockScreen();
            }
        });

        function showLockScreen() {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById('lock-screen').classList.remove('hidden');
            document.getElementById('pass-verify').value = "";
        }

        function verifyPassword() {
            const pass = document.getElementById('pass-verify').value;
            if (pass === settings.appPass) {
                document.getElementById('lock-screen').classList.add('hidden');
                document.getElementById('main-screen').classList.remove('hidden');
                normalVid.play();
            } else {
                alert("Incorrect Password!");
            }
        }

        function saveSettings() {
    const data = {
        userName: document.getElementById('user-name').value,
        appPass: document.getElementById('app-pass').value,
        apiKeys: [
            document.getElementById('api-1').value,
            document.getElementById('api-2').value,
            document.getElementById('api-3').value
        ].filter(k => k.trim() !== ""),
        
        prompt: document.getElementById('ai-prompt').value
    };
    
    if(!data.appPass || data.apiKeys.length === 0) {
        alert("Password, Chat API keys zaroori hain!");
        return;
    }

    localStorage.setItem('ai_settings', JSON.stringify(data));
    settings = data;
    location.reload();
}


        function showSettings() {
    document.getElementById('main-screen').classList.add('hidden');
    document.getElementById('login-screen').classList.remove('hidden');
    
    if (settings) {
        document.getElementById('user-name').value = settings.userName || "";
        document.getElementById('app-pass').value = settings.appPass || "";
        document.getElementById('api-1').value = (settings.apiKeys && settings.apiKeys[0]) ? settings.apiKeys[0] : "";
        document.getElementById('api-2').value = (settings.apiKeys && settings.apiKeys[1]) ? settings.apiKeys[1] : "";
        document.getElementById('api-3').value = (settings.apiKeys && settings.apiKeys[2]) ? settings.apiKeys[2] : "";
        document.getElementById('ai-prompt').value = settings.prompt || "";
    }
}


        function clearMemory() {
    // Pop-up dikhane ke liye confirm use karenge
    const confirmation = confirm("Kya aap saari memory delete karna chahte hain? Isse purani baatein SARA bhool jayegi.");
    
    if (confirmation) {
        chatHistory = []; // Memory clear kar di
        alert("Saari memory delete ho gayi hai!");
    } else {
        // Agar user 'Cancel' dabata hai toh kuch nahi hoga
        console.log("Memory clear cancel kar di gayi.");
    }
}

        // Voice Recognition setup
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'hi-IN';
        recognition.continuous = false;

        function toggleMic() {
    if (isListening) {
        recognition.stop(); // Manual stop karne par onend trigger hoga
    } else {
        try {
            recognition.start();
            document.getElementById('mic-btn').classList.add('listening');
            isListening = true;
            interimText = ""; // Pichli baaton ko clear karne ke liye
        } catch (e) {
            console.log("Recognition error: " + e);
        }
    }
}


        recognition.onresult = (event) => {
    // Jo aap bol rahe hain wo variable mein jama hota rahega
    interimText = event.results[0][0].transcript;
};


        recognition.onend = () => {
    document.getElementById('mic-btn').classList.remove('listening');
    isListening = false;
    
    // Agar aapne kuch bola hai, tabhi AI ko request jayegi
    if (interimText.trim() !== "") {
        processAI(interimText);
        interimText = ""; // Bhejne ke baad clear kar dein
    }
};


        function handleTextSend() {
            const input = document.getElementById('text-input');
            if (input.value.trim()) {
                processAI(input.value);
                input.value = "";
            }
        }

        async function processAI(userInput) {
            chatHistory.push({ role: "user", content: userInput });
            if (chatHistory.length > 20) chatHistory.shift();

            let success = false;
            const keys = settings.apiKeys;

            for (let i = 0; i < keys.length; i++) {
                try {
                    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                        method: "POST",
                        headers: {
                            "Authorization": `Bearer ${keys[currentKeyIdx]}`,
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                             model: "llama-3.3-70b-versatile",
                            temperature: 0.9,
                            messages: [
                                { role: "system",
                                content: `Tumhara naam SARA hai. ${settings.prompt}. Hamesha isi personality mein rehna aur short/bold jawab dena.`},
                                ...chatHistory
                            ]
                        })
                    });

                    if (!response.ok) throw new Error("Key Failed");

                    const data = await response.json();
                    const reply = data.choices[0].message.content;
                    chatHistory.push({ role: "assistant", content: reply });
                    playVoice(reply);
                    success = true;
                    break;
                } catch (e) {
                    currentKeyIdx = (currentKeyIdx + 1) % keys.length;
                    console.log("Switching to next key...");
                }
            }

            if (!success) {
                playVoice("api error, please check keys.");
            }
        }

       let tts = null; // Global variable for TTS engine

async function initTTS() {
    // Model files ke paths (aap inhe Hugging Face se link kar sakte hain)
    const config = {
        model: "https://huggingface.co/csukuangfj/sherpa-onnx-tts-hi-vits-ljspeech/resolve/main/model.onnx",
        tokens: "https://huggingface.co/csukuangfj/sherpa-onnx-tts-hi-vits-ljspeech/resolve/main/tokens.txt",
        dataDir: "https://huggingface.co/csukuangfj/sherpa-onnx-tts-hi-vits-ljspeech/resolve/main/"
    };
    
    // Sherpa-ONNX Engine initialize karein
    tts = await sherpaOnnx.createOfflineTts(config);
    console.log("SARA Offline Voice Ready!");
}

async function playVoice(text) {
    try {
        if (!tts) {
            console.log("Model load ho raha hai, thoda intezar karein...");
            await initTTS(); 
        }

        // Animation Start
        normalVid.classList.add('hidden');
        speakingVid.classList.remove('hidden');
        speakingVid.play().catch(()=>{});

        // Correct way to generate audio for Sherpa-ONNX
        // sid: 0 ka matlab hai default voice
        const audioData = tts.generate({
            text: text,
            sid: 0, 
            speed: 1.0
        });

        const blob = new Blob([audioData.samples.buffer], { type: 'audio/wav' });
        const url = URL.createObjectURL(blob);
        
        const audio = new Audio(url);
        
        audio.onended = () => {
            resetVideo();
            URL.revokeObjectURL(url);
        };

        audio.onerror = () => {
            console.error("Audio playback mein galti!");
            resetVideo();
        };

        await audio.play();

    } catch (error) {
        console.error("Sherpa TTS Error:", error);
        resetVideo();
    }
}

function resetVideo() {
    speakingVid.pause();
    speakingVid.classList.add('hidden');
    normalVid.classList.remove('hidden');
    normalVid.play().catch(()=>{});
}

    </script>
</body>
</html>
